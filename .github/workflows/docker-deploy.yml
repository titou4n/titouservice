name: Docker Build & Push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Nginx configuration
        run: |
          mkdir -p /tmp/nginx-test/ssl
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout /tmp/nginx-test/ssl/key.pem -out /tmp/nginx-test/ssl/cert.pem \
            -subj "/CN=nginx-config-test"
          sed 's/flask:5000/127.0.0.1:5000/' nginx/default.conf > /tmp/nginx-test/default.conf
          docker run --rm \
            -v /tmp/nginx-test/default.conf:/etc/nginx/conf.d/default.conf:ro \
            -v /tmp/nginx-test/ssl:/etc/nginx/ssl:ro \
            nginx:latest nginx -t

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (titouservice-flask)
        run: |
          docker build -t titou4n/titouservice-flask:latest -f flask/Dockerfile ./flask
          # Tag avec le SHA du commit pour versionner
          docker tag titou4n/titouservice-flask:latest titou4n/titouservice-flask:${{ github.sha }}

      - name: Build Docker image (titouservice-nginx)
        run: |
          docker build -t titou4n/titouservice-nginx:latest -f nginx/Dockerfile ./nginx
          # Tag avec le SHA du commit pour versionner
          docker tag titou4n/titouservice-nginx:latest titou4n/titouservice-nginx:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push titou4n/titouservice-flask:latest
          docker push titou4n/titouservice-flask:${{ github.sha }}
          docker push titou4n/titouservice-nginx:latest
          docker push titou4n/titouservice-nginx:${{ github.sha }}