upstream flask_app {
    server titouservice-flask:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name titouservice.ltjs.net;
    server_tokens off;

    # Security headers (OK pour prod)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP plus safe (évite trop de blocages inutiles)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" always;

    location / {
        proxy_pass http://flask_app;

        # Standard reverse proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # IMPORTANT: ne pas forcer https ici
        proxy_set_header X-Forwarded-Proto $scheme;

        # Web compatibility
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Stability
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
    }
}