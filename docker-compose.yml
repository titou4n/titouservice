services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: titouservice-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflare_tunnel_token
    depends_on:
      - nginx
    networks:
      # Edge tier only: cloudflared can resolve/reach nginx, nothing else.
      # It is never attached to titouservice-network, so even if this
      # container were compromised it could not reach flask:5000 or
      # redis:6379 directly - it would have to go through nginx (Host
      # header check, security headers, etc.) like any other client.
      - titouservice-edge-network
    secrets:
      - cloudflare_tunnel_token

  flask:
    image: titou4n/titouservice-flask:latest
    container_name: titouservice-flask
    restart: unless-stopped

    environment:
      ENV_PROD: "true"
      FLASK_ENV: "production"

      RATELIMIT_STORAGE_URI: redis://redis:6379/0

      # NPM is no longer in the chain (replaced by Cloudflare Tunnel, see
      # audits/). Topology is now: Cloudflare edge -> cloudflared -> nginx
      # (this repo) -> Flask. Cloudflare appends the visitor IP to
      # X-Forwarded-For before reaching cloudflared, and nginx appends its
      # own peer (cloudflared) before Flask -> still 2 hops in principle,
      # but CONFIRM empirically (nginx access log) after cutover before
      # relying on this value; there is no exposed public port left for an
      # attacker to forge this header against regardless.
      PROXY_TRUSTED_HOP_COUNT: "2"

      # No internal proxy network needs special trust anymore now that NPM
      # is gone - falls back to config.py's default (localhost-only). Only
      # set this if you have another internal caller (e.g. a healthcheck)
      # that legitimately needs to set X-Forwarded-For directly.
      # TRUSTED_PROXY_NETWORKS: "<CIDR>"

    volumes:
      - db-data:/app/Data/db
      - ./secrets:/run/secrets:ro

    expose:
      - "5000"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - titouservice-network

    secrets:
      - secret_key
      - email_app_password
      - omdb_api_key
      - twelvedata_api_key

  redis:
    image: redis:7-alpine
    container_name: titouservice-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    volumes:
      - redis-data:/data

    networks:
      - titouservice-network

  nginx:
    image: nginx:latest
    container_name: titouservice-nginx
    restart: unless-stopped

    # No `ports:` - not published on the host at all. The only path in is
    # Cloudflare Tunnel -> cloudflared -> this container, over the internal
    # titouservice-edge-network below. Nothing to scan/bypass from the public internet.

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro

    depends_on:
      - flask

    networks:
      # Sits on both tiers: reachable from cloudflared (titouservice-edge-network) and
      # able to reach flask (titouservice-network) - the only bridge
      # between the two.
      - titouservice-edge-network
      - titouservice-network

networks:
  # Public-facing tier: only cloudflared and nginx live here.
  titouservice-edge-network:
    driver: bridge

  # Backend tier: flask, redis and nginx (as the bridge). No fixed subnet
  # pinning needed anymore - that was only there to match Nginx Proxy
  # Manager's gateway address for TRUSTED_PROXY_NETWORKS, which no longer
  # applies now that NPM is out of the chain (see audits/).
  titouservice-network:
    driver: bridge

volumes:
  db-data:
  redis-data:

secrets:
  secret_key:
    file: ./secrets/secret_key.txt
  email_app_password:
    file: ./secrets/email_app_password.txt
  omdb_api_key:
    file: ./secrets/omdb_api_key.txt
  twelvedata_api_key:
    file: ./secrets/twelvedata_api_key.txt
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token.txt